[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
gas_reports = ["IncentiveFactory", "SettlementVault"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 15

# L2 Polygon PoS simulation profile
[profile.polygon]
evm_version = "cancun"

# L1 Ethereum simulation profile
[profile.mainnet]
evm_version = "cancun"
